<div class="auth-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Bejelentkezés</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div *ngIf="error" class="error-msg">{{ error }}</div>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" fullWidth>
          <mat-label>Felhasználónév</mat-label>
          <input matInput formControlName="username" type="text" />
        </mat-form-field>
        <mat-form-field appearance="outline" fullWidth>
          <mat-label>Jelszó</mat-label>
          <input matInput formControlName="password" type="password" />
        </mat-form-field>
        <div class="actions">
          <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid">Bejelentkezés</button>
          <a routerLink="/register">Nincs még fiókod? Regisztráció</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
