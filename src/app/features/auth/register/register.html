<div class="auth-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Regisztráció</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div *ngIf="error" class="error-msg">{{ error }}</div>
      <div *ngIf="success" class="success-msg">Sikeres regisztráció! Átirányítás...</div>
      <form *ngIf="!success" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" fullWidth>
          <mat-label>Felhasználónév</mat-label>
          <input matInput formControlName="username" type="text" />
        </mat-form-field>
        <mat-form-field appearance="outline" fullWidth>
          <mat-label>Jelszó (min 4 karakter)</mat-label>
          <input matInput formControlName="password" type="password" />
        </mat-form-field>
        <div class="actions">
          <button mat-flat-button color="primary" type="submit" [disabled]="registerForm.invalid">Regisztráció</button>
          <a routerLink="/login">Már van fiókod? Bejelentkezés</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
